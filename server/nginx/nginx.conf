events {
    worker_connections 1024;
}

http {
    # Mantenim les connexions WebSocket vives
    map $http_upgrade $connection_upgrade {
        default upgrade;
        '' close;
    }

    server {
        listen 80;
        
        # Pots afegir un server_name aquí si tinguessis domini
        # server_name elteudomini.com;

        # Redirigir tot el trànsit de la API (HTTP normal)
        location /api/ {
            proxy_pass http://backend:11100;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        }

        # Redirigir el trànsit de WebSockets (per a Socket.io i el multijugador)
        location /socket.io/ {
            proxy_pass http://backend:11100;
            proxy_http_version 1.1;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection "Upgrade";
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        }
    }
}
