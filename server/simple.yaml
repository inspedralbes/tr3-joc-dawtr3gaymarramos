behaviors:
  PolBehavior:
    trainer_type: ppo
    hyperparameters:
      batch_size: 1024
      buffer_size: 10240
      learning_rate: 3.0e-4
      beta: 5.0e-3
      epsilon: 0.2
      lambd: 0.95
      num_epoch: 3
    network_settings:
      normalize: true
      hidden_units: 256 
      num_layers: 2
    reward_signals:
      extrinsic:
        gamma: 0.99
        strength: 1.0
      curiosity: # ¡NUEVO! Les obliga a explorar el mapa para no aburrirse
        gamma: 0.99
        strength: 0.1
        learning_rate: 3.0e-4
    max_steps: 500000 # Subido para que tengan tiempo de aprender
    time_horizon: 128
    summary_freq: 5000

  AlvaroBehavior:
